{{ define "main" }}
<div class="d-flex flex-column justify-content-center align-items-center four-oh-four text-center px-3">
    <div class="four-oh-four__code" aria-hidden="true">404</div>
    <h1 class="four-oh-four__title">{{ i18n "page_not_found" }}</h1>
    <p class="four-oh-four__desc text-muted">{{ i18n "page_not_found_desc" }}</p>
    <a href="{{ "" | relURL }}" class="btn btn-primary mt-3">
        <i class="material-icons align-middle me-1">home</i>
        {{ i18n "back_to_home" }}
    </a>
</div>
{{ end }}
